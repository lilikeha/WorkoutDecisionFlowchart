<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Decision Flow</title>
  <style>
    body {
      font-family: Courier New, monospace;
      background: #ffcfd9;
      color: black;
      margin: 0;
      padding: 30px 20px;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 10px;
    }

    .card {
      background: #d9fbff;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 30px 20px;
      margin-top: 20px;
    }

    #question {
      font-size: 2rem;
      line-height: 1.3;
      margin-bottom: 25px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      font-size: 1.1rem;
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ffef94;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      font-size: 1.8rem;
      margin-top: 15px;
      line-height: 1.4;
    }

    .subtext {
      color: #666;
      margin-top: 12px;
      font-size: 1rem;
    }

    .restart-btn {
      margin-top: 25px;
      background: #ffef94;
      color: black;
    }

    .log-section {
      margin-top: 40px;
      text-align: left;
    }

    .log-section h2 {
      text-align: center;
    }

    .log-entry {
      background: #d9fbff;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .clear-btn {
      margin-top: 15px;
      background: #ffef94;
      color: black;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Workout Decision Flow</h1>
    <p class="subtext">Answer the questions to get today’s workout.</p>

    <div class="card">
      <div id="question"></div>
      <div id="buttons" class="buttons"></div>
      <div id="result" class="result"></div>
      <div id="path" class="subtext"></div>
    </div>

    <div class="log-section">
      <h2>Workout Log</h2>
      <div id="log"></div>
      <button class="clear-btn" onclick="clearLog()">Clear Log</button>
    </div>
  </div>

  <script>
    const tree = {
      start: {
        question: "Do your obligations end at 5pm?",
        yes: "soccerToday",
        no: "restDayThisWeek"
      },

      soccerToday: {
        question: "Is there soccer today?",
        yes: "soccerAt6",
        no: "lowerYesterday"
      },

      soccerAt6: {
        question: "Is it at 6pm?",
        yes: {
          result: "Cardio/abs day",
          details: "10 min abs in room"
        },
        no: {
          result: "Cardio/abs day",
          details: "30–45 min abs in gym"
        }
      },

      lowerYesterday: {
        question: "Did you hit lower yesterday?",
        yes: "absYesterday_afterLowerYes",
        no: "absYesterday_afterLowerNo"
      },

      absYesterday_afterLowerYes: {
        question: "Did you hit abs yesterday?",
        yes: {
          result: "Upper/cardio",
          details: ""
        },
        no: {
          result: "Upper/abs",
          details: ""
        }
      },

      absYesterday_afterLowerNo: {
        question: "Did you hit abs yesterday?",
        yes: {
          result: "Lower/cardio",
          details: ""
        },
        no: {
          result: "Lower/abs",
          details: ""
        }
      },

      restDayThisWeek: {
        question: "Have you had a rest day this week?",
        yes: {
          result: "Yoga",
          details: "30–45 min yoga"
        },
        no: {
          result: "Rest day",
          details: ""
        }
      }
    };

    let currentNode = "start";
    let answerPath = [];

    function renderNode() {
      const questionEl = document.getElementById("question");
      const buttonsEl = document.getElementById("buttons");
      const resultEl = document.getElementById("result");
      const pathEl = document.getElementById("path");

      resultEl.textContent = "";
      pathEl.textContent = "";

      const node = tree[currentNode];
      questionEl.textContent = node.question;
      buttonsEl.innerHTML = `
        <button onclick="chooseAnswer('yes')">Yes</button>
        <button onclick="chooseAnswer('no')">No</button>
      `;
    }

    function chooseAnswer(answer) {
      const node = tree[currentNode];
      answerPath.push(`${node.question} → ${answer.toUpperCase()}`);

      const next = node[answer];

      if (typeof next === "string") {
        currentNode = next;
        renderNode();
      } else {
        showResult(next.result, next.details);
      }
    }

    function showResult(result, details) {
      const questionEl = document.getElementById("question");
      const buttonsEl = document.getElementById("buttons");
      const resultEl = document.getElementById("result");
      const pathEl = document.getElementById("path");

      questionEl.textContent = "Today's Result";
      buttonsEl.innerHTML = `<button class="restart-btn" onclick="restartFlow()">Start Over</button>`;
      resultEl.innerHTML = `<strong>${result}</strong>${details ? "<br><span style='font-size:1.1rem; color:#ccc;'>" + details + "</span>" : ""}`;
      pathEl.textContent = answerPath.join(" | ");

      saveLog(result, details, answerPath);
      renderLog();
    }

    function restartFlow() {
      currentNode = "start";
      answerPath = [];
      renderNode();
    }

    function saveLog(result, details, path) {
      const logs = JSON.parse(localStorage.getItem("workoutLogs")) || [];
      const now = new Date();

      logs.unshift({
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString(),
        result: result,
        details: details,
        path: path.join(" | ")
      });

      localStorage.setItem("workoutLogs", JSON.stringify(logs));
    }

    function renderLog() {
      const logEl = document.getElementById("log");
      const logs = JSON.parse(localStorage.getItem("workoutLogs")) || [];

      if (logs.length === 0) {
        logEl.innerHTML = "<p style='text-align:center; color:#aaa;'>No entries yet.</p>";
        return;
      }

      logEl.innerHTML = logs.map(entry => `
        <div class="log-entry">
          <strong>${entry.date} ${entry.time}</strong><br>
          ${entry.result}${entry.details ? " — " + entry.details : ""}<br>
          <span style="color:#aaa; font-size:0.95rem;">${entry.path}</span>
        </div>
      `).join("");
    }

    function clearLog() {
      localStorage.removeItem("workoutLogs");
      renderLog();
    }

    renderNode();
    renderLog();
  </script>
</body>
</html>
